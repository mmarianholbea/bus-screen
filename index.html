<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bus Times</title>

<style>
:root{
  --red:#d40000;
  --black:#000;
  --gray:#e6e6e6;
}

body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:#fff;
  color:var(--black);
}

.wrap{
  padding:40px 60px 30px;
}

/* ===== TOP LINE ===== */

.topline{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:start;
  margin-bottom:20px;
}

.stop{
  font-size:68px;
  font-weight:900;
  white-space:nowrap;
}

/* CENTER BLOCK */
.centerblock{
  justify-self:center;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.centertext{
  font-size:68px;
  font-weight:900;
  color:var(--red);
  line-height:1;
}

/* BIG THICK ARROW */
.bigarrow{
  margin-top:12px;
  font-size:120px;          /* MUCH BIGGER */
  font-weight:900;
  color:var(--red);
  line-height:1;
  animation:nudge 1s ease-in-out infinite;
}

/* Animation */
@keyframes nudge{
  0%,100%{ transform: translateX(0); }
  50%{ transform: translateX(25px); }
}

.clock{
  font-size:78px;
  font-weight:900;
  text-align:right;
  white-space:nowrap;
}

/* ===== TABLE ===== */

table{
  width:100%;
  border-collapse:collapse;
}

thead th{
  text-align:left;
  font-size:34px;
  font-weight:900;
  padding:18px 0 14px;
  border-bottom:4px solid #000;
}

thead th:last-child{
  text-align:right;
}

tbody td{
  padding:34px 0;
  border-bottom:2px solid var(--gray);
  vertical-align:middle;
}

.line{
  color:var(--red);
  font-size:86px;
  font-weight:900;
  width:220px;
}

.dest{
  color:var(--red);
  font-size:72px;
  font-weight:900;
}

.eta{
  color:var(--red);
  font-size:86px;
  font-weight:900;
  text-align:right;
  white-space:nowrap;
  width:260px;
}

.muted{
  font-size:34px;
  color:#666;
  padding:24px 0;
}

.error{
  font-size:34px;
  color:var(--red);
  font-weight:900;
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="topline">

    <div class="stop">Stop R • Stratford</div>

    <div class="centerblock">
      <div class="centertext">BUS STOP ON THE RIGHT</div>
      <div class="bigarrow">→</div>
    </div>

    <div id="clock" class="clock">--:--</div>

  </div>

  <div id="err" class="error">Can’t load live bus times.</div>

  <table>
    <thead>
      <tr>
        <th>Line</th>
        <th>Destination</th>
        <th>ETA</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="3" class="muted">Loading…</td></tr>
    </tbody>
  </table>

</div>

<script>
const STOPPOINT_ID = "490009140S";
const APP_ID = "mmarianholbea";
const APP_KEY = "2ed7f93cc9bf4afeba5a399e39497c78";

const REFRESH_MS = 5000;
const MAX_ROWS = 10;

function setClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById("clock").textContent = `${hh}:${mm}`;
}

function showError(){
  document.getElementById("err").style.display = "block";
}

function hideError(){
  document.getElementById("err").style.display = "none";
}

async function loadArrivals(){
  const url =
    `https://api.tfl.gov.uk/StopPoint/${STOPPOINT_ID}/Arrivals` +
    `?app_id=${APP_ID}&app_key=${APP_KEY}`;

  const res = await fetch(url, { cache: "no-store" });
  if(!res.ok) throw new Error();

  const data = await res.json();
  data.sort((a,b)=>a.timeToStation-b.timeToStation);

  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  if(!data.length){
    tbody.innerHTML =
      `<tr><td colspan="3" class="muted">No live arrivals right now</td></tr>`;
    return;
  }

  data.slice(0,MAX_ROWS).forEach(bus=>{
    const mins = Math.max(0, Math.round(bus.timeToStation/60));
    const etaText = mins===0 ? "Due" : `${mins} min`;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="line">${bus.lineName}</td>
      <td class="dest">${bus.destinationName || ""}</td>
      <td class="eta">${etaText}</td>
    `;
    tbody.appendChild(tr);
  });
}

async function tick(){
  try{
    hideError();
    await loadArrivals();
  }catch{
    showError();
  }
}

setClock();
setInterval(setClock,1000);

tick();
setInterval(tick,REFRESH_MS);
</script>

</body>
</html>
