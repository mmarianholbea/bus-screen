<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bus Times</title>
  <style>
    :root{
      --red:#d40000;
      --black:#000;
      --grid:#e7e7e7;
    }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#fff;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--black);
    }

    .wrap{
      box-sizing:border-box;
      height:100%;
      padding:32px 72px 24px;
    }

    /* ===== HEADER ===== */
    .header{
      display:grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      column-gap: 24px;
    }

    .stop{
      font-size: 56px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }

    .mid{
      text-align:center;
      min-width: 0;
    }

    .mid .busstop{
      font-size: 56px;
      font-weight: 900;
      color: var(--red);
      line-height: 1;
      white-space: nowrap;
      display:inline-block;
    }

    .clock{
      font-size: 64px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }

    /* ===== WALKER (replaces arrow) ===== */
    .walkerRow{
      display:grid;
      grid-template-columns: auto 1fr auto;
      margin-top: 6px;
    }
    .walkerBox{
      grid-column: 2;
      justify-self: center;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* the whole icon gently moves right & back */
    .walker{
      display:inline-block;
      animation: nudge 1.1s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes nudge{
      0%,100%{ transform: translateX(0); }
      50%{ transform: translateX(26px); }
    }

    /* subtle "walking" leg swing */
    .legFront{
      transform-origin: 55px 86px;
      animation: legSwing 0.55s ease-in-out infinite;
    }
    .legBack{
      transform-origin: 55px 86px;
      animation: legSwingBack 0.55s ease-in-out infinite;
    }
    @keyframes legSwing{
      0%,100%{ transform: rotate(10deg); }
      50%{ transform: rotate(-12deg); }
    }
    @keyframes legSwingBack{
      0%,100%{ transform: rotate(-10deg); }
      50%{ transform: rotate(12deg); }
    }

    /* “pointing hand” bounce */
    .hand{
      transform-origin: 98px 52px;
      animation: handPulse 0.8s ease-in-out infinite;
    }
    @keyframes handPulse{
      0%,100%{ transform: translateX(0); }
      50%{ transform: translateX(6px); }
    }

    .walker svg{
      width: 240px;
      height: 70px;
      display:block;
    }

    /* ===== TABLE ===== */
    table{
      width:100%;
      border-collapse: collapse;
      margin-top: 10px;
      table-layout: fixed;
    }

    thead th{
      font-size: 24px;
      font-weight: 900;
      padding: 6px 0 8px;
      border-bottom: 4px solid #000;
      text-align: left;
    }

    thead th:nth-child(1){ width: 160px; }
    thead th:nth-child(2){ width: auto; }
    thead th:nth-child(3){
      width: 300px;
      text-align: right;
    }

    tbody td{
      padding: 18px 0;
      border-bottom: 2px solid var(--grid);
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    td.line{
      font-size: 74px;
      font-weight: 900;
      color: var(--red);
      white-space: nowrap;
    }

    td.dest{
      font-size: 64px;
      font-weight: 900;
      color: var(--red);
      white-space: nowrap;
    }

    td.eta{
      font-size: 74px;
      font-weight: 900;
      color: var(--red);
      text-align: right;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .noWrap{
      white-space: nowrap;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <div class="stop">Stop R • Stratford</div>

      <div class="mid">
        <div class="busstop">BUS STOP</div>
      </div>

      <div id="clock" class="clock">--:--</div>
    </div>

    <!-- Walker centered under BUS STOP -->
    <div class="walkerRow">
      <div class="walkerBox">
        <div class="walker" aria-hidden="true">
          <!-- Simple red “walking person pointing right” (SVG) -->
          <svg viewBox="0 0 140 60" xmlns="http://www.w3.org/2000/svg">
            <!-- head -->
            <circle cx="32" cy="14" r="7" fill="var(--red)"/>
            <!-- body -->
            <path d="M32 22
                     C28 28, 28 33, 30 38
                     C33 43, 36 43, 39 38
                     C41 33, 40 28, 36 22"
                  fill="var(--red)"/>

            <!-- pointing arm (to the right) -->
            <g class="hand">
              <path d="M38 28
                       C52 28, 60 28, 78 28
                       C84 28, 90 26, 96 24
                       C98 23, 101 26, 99 29
                       C96 34, 90 36, 82 36
                       C62 36, 52 36, 38 36"
                    fill="var(--red)"/>
              <!-- small “finger” tip -->
              <circle cx="101" cy="27" r="3.5" fill="var(--red)"/>
            </g>

            <!-- legs -->
            <g class="legBack">
              <path d="M31 38
                       C26 44, 22 49, 18 56
                       C17 58, 20 60, 22 58
                       C27 52, 31 47, 35 42"
                    fill="var(--red)"/>
            </g>

            <g class="legFront">
              <path d="M37 38
                       C34 45, 33 51, 32 57
                       C32 60, 36 60, 36 57
                       C37 51, 39 46, 42 41"
                    fill="var(--red)"/>
            </g>

            <!-- a little motion trail to suggest direction -->
            <rect x="108" y="25" width="22" height="4" rx="2" fill="var(--red)" opacity="0.5"/>
            <rect x="112" y="33" width="18" height="4" rx="2" fill="var(--red)" opacity="0.35"/>
          </svg>
        </div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Line</th>
          <th>Destination</th>
          <th>ETA</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="3">Loading…</td></tr>
      </tbody>
    </table>

  </div>

  <script>
    const STOPPOINT_ID = "490009140S";
    const APP_ID = "mmarianholbea";
    const APP_KEY = "2ed7f93cc9bf4afeba5a399e39497c78";

    const REFRESH_MS = 5000;
    const MAX_ROWS = 12;

    function setClock() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      document.getElementById("clock").textContent = `${hh}:${mm}`;
    }

    async function loadArrivals() {
      const url = `https://api.tfl.gov.uk/StopPoint/${encodeURIComponent(STOPPOINT_ID)}/Arrivals?app_id=${encodeURIComponent(APP_ID)}&app_key=${encodeURIComponent(APP_KEY)}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("TfL API error " + res.status);
      const data = await res.json();

      data.sort((a,b) => a.timeToStation - b.timeToStation);

      const tbody = document.getElementById("rows");
      tbody.innerHTML = "";

      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="3">No live arrivals</td></tr>`;
        return;
      }

      data.slice(0, MAX_ROWS).forEach(x => {
        const mins = Math.max(0, Math.round(x.timeToStation / 60));
        const etaText = mins === 0 ? "Due" : `${mins} min`;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="line">${x.lineName}</td>
          <td class="dest">${x.destinationName || ""}</td>
          <td class="eta"><span class="noWrap">${etaText}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    setClock();
    setInterval(setClock, 1000);

    loadArrivals();
    setInterval(loadArrivals, REFRESH_MS);
  </script>
</body>
</html>
