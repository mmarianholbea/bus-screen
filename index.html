<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bus Times</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:#ffffff;
  color:#000000;
}

.container{
  padding:80px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
}

.title{
  font-size:60px;
  font-weight:900;
}

.clock{
  font-size:50px;
  font-weight:700;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:80px;
}

th{
  text-align:left;
  font-size:36px;
  padding-bottom:25px;
  border-bottom:4px solid #000;
}

td{
  padding:40px 0;
  border-bottom:2px solid #ddd;
  vertical-align:middle;
}

.line{
  font-size:80px;
  font-weight:900;
  width:180px;
}

.destination{
  font-size:60px;
  font-weight:600;
}

.eta{
  font-size:80px;
  font-weight:900;
  text-align:right;
  width:220px;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="title">Stop R • Stratford</div>
    <div id="clock" class="clock">--:--</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Line</th>
        <th>Destination</th>
        <th style="text-align:right;">ETA</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="3">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
const STOPPOINT_ID = "490009140S";
const APP_ID = "mmarianholbea";
const APP_KEY = "2ed7f93cc9bf4afeba5a399e39497c78";
const REFRESH_MS = 5000;

function updateClock(){
  const d = new Date();
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  document.getElementById("clock").textContent = h + ":" + m;
}

async function loadBuses(){
  const url =
    `https://api.tfl.gov.uk/StopPoint/${STOPPOINT_ID}/Arrivals?app_id=${APP_ID}&app_key=${APP_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  data.sort((a,b)=>a.timeToStation-b.timeToStation);

  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  if(data.length===0){
    tbody.innerHTML = `<tr><td colspan="3">No arrivals</td></tr>`;
    return;
  }

  data.slice(0,8).forEach(bus=>{
    const mins = Math.max(0,Math.round(bus.timeToStation/60));
    const eta = mins===0 ? "Due" : mins+" min";

    const row = document.createElement("tr");
    row.innerHTML = `
      <td class="line">${bus.lineName}</td>
      <td class="destination">${bus.destinationName}</td>
      <td class="eta">${eta}</td>
    `;
    tbody.appendChild(row);
  });
}

updateClock();
setInterval(updateClock,1000);

loadBuses();
setInterval(loadBuses,REFRESH_MS);
</script>

</body>
</html>
