<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bus Times</title>
  <style>
    :root{
      --red:#d40000;
      --black:#000;
      --grid:#e7e7e7;
    }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#fff;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--black);
    }

    /* safe padding for TV overscan */
    .wrap{
      box-sizing:border-box;
      height:100%;
      padding:32px 72px 24px;
    }

    /* ===== HEADER ===== */
    .header{
      display:grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      column-gap: 24px;
    }

    .stop{
      font-size: 56px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }

    .mid{
      text-align:center;
      min-width: 0;
    }

    .mid .busstop{
      font-size: 56px;
      font-weight: 900;
      color: var(--red);
      line-height: 1;
      white-space: nowrap;
      display:inline-block;
    }

    .clock{
      font-size: 64px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }

    .arrowRow{
      display:grid;
      grid-template-columns: auto 1fr auto;
      margin-top: 6px; /* tight */
    }
    .arrowRow .arrowBox{
      grid-column: 2;
      justify-self: center;
    }

    .arrow{
      display:inline-block;
      animation: nudge 1s ease-in-out infinite;
    }
    @keyframes nudge{
      0%,100%{ transform: translateX(0); }
      50%{ transform: translateX(22px); }
    }

    .arrow svg{
      width: 260px;
      height: 64px;
      display:block;
    }
    .arrow line{
      stroke: var(--red);
      stroke-width: 20;
      stroke-linecap: round;
    }
    .arrow polygon{
      fill: var(--red);
    }

    /* ===== TABLE ===== */
    table{
      width:100%;
      border-collapse: collapse;
      margin-top: 10px; /* brings black line higher */
      table-layout: fixed; /* important for stable columns */
    }

    thead th{
      font-size: 24px;
      font-weight: 900;
      padding: 6px 0 8px;
      border-bottom: 4px solid #000;
      text-align: left;
    }

    thead th:nth-child(1){ width: 160px; }
    thead th:nth-child(2){ width: auto; }
    thead th:nth-child(3){
      width: 300px;         /* BIG fixed ETA column so it won't wrap */
      text-align: right;
    }

    tbody td{
      padding: 18px 0;      /* tighter -> more rows */
      border-bottom: 2px solid var(--grid);
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    td.line{
      font-size: 74px;
      font-weight: 900;
      color: var(--red);
      white-space: nowrap;
    }

    td.dest{
      font-size: 64px;
      font-weight: 900;
      color: var(--red);
      white-space: nowrap;
    }

    td.eta{
      font-size: 74px;
      font-weight: 900;
      color: var(--red);
      text-align: right;
      white-space: nowrap;  /* CRITICAL: prevents "min" going under */
      letter-spacing: 0.5px;
    }

    /* remove any accidental line breaks from TV browsers */
    .noWrap{
      white-space: nowrap;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <div class="stop">Stop R • Stratford</div>

      <div class="mid">
        <div class="busstop">BUS STOP</div>
      </div>

      <div id="clock" class="clock">--:--</div>
    </div>

    <div class="arrowRow">
      <div class="arrowBox">
        <div class="arrow" aria-hidden="true">
          <svg viewBox="0 0 320 100">
            <line x1="10" y1="50" x2="220" y2="50"></line>
            <polygon points="220,12 310,50 220,88"></polygon>
          </svg>
        </div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Line</th>
          <th>Destination</th>
          <th>ETA</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="3">Loading…</td></tr>
      </tbody>
    </table>

  </div>

  <script>
    const STOPPOINT_ID = "490009140S";
    const APP_ID = "mmarianholbea";
    const APP_KEY = "2ed7f93cc9bf4afeba5a399e39497c78";

    const REFRESH_MS = 5000;
    const MAX_ROWS = 12;

    function setClock() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      document.getElementById("clock").textContent = `${hh}:${mm}`;
    }

    async function loadArrivals() {
      const url = `https://api.tfl.gov.uk/StopPoint/${encodeURIComponent(STOPPOINT_ID)}/Arrivals?app_id=${encodeURIComponent(APP_ID)}&app_key=${encodeURIComponent(APP_KEY)}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("TfL API error " + res.status);
      const data = await res.json();

      data.sort((a,b) => a.timeToStation - b.timeToStation);

      const tbody = document.getElementById("rows");
      tbody.innerHTML = "";

      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="3">No live arrivals</td></tr>`;
        return;
      }

      data.slice(0, MAX_ROWS).forEach(x => {
        const mins = Math.max(0, Math.round(x.timeToStation / 60));
        const etaText = mins === 0 ? "Due" : `${mins} min`;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="line">${x.lineName}</td>
          <td class="dest">${x.destinationName || ""}</td>
          <td class="eta"><span class="noWrap">${etaText}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    setClock();
    setInterval(setClock, 1000);

    loadArrivals();
    setInterval(loadArrivals, REFRESH_MS);
  </script>
</body>
</html>
