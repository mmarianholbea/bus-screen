<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bus Times</title>

<style>
:root{
  --red:#d40000;
  --black:#000;
  --gray:#e6e6e6;
}

body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:#fff;
  color:var(--black);
}

.wrap{
  padding:28px 50px 24px;
}

/* HEADER */
.header{
  display:flex;
  align-items:flex-start;
  position:relative;
}

.stop{
  font-size:68px;
  font-weight:900;
  white-space:nowrap;
}

.clock{
  font-size:78px;
  font-weight:900;
  white-space:nowrap;
  margin-left:auto;
}

/* CENTER */
.center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
}

.centertext{
  font-size:68px;
  font-weight:900;
  color:var(--red);
  line-height:1;
}

/* BIG CUSTOM ARROW */
.arrow-wrapper{
  margin-top:8px;
  animation:nudge 1s ease-in-out infinite;
}

.arrow-svg{
  width:220px;     /* MUCH BIGGER */
  height:80px;
}

.arrow-line{
  stroke:var(--red);
  stroke-width:18; /* THICK */
  stroke-linecap:round;
}

.arrow-head{
  fill:var(--red);
}

@keyframes nudge{
  0%,100%{ transform: translateX(0); }
  50%{ transform: translateX(28px); }
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:18px;
}

thead th{
  text-align:left;
  font-size:34px;
  font-weight:900;
  padding:16px 0 12px;
  border-bottom:4px solid #000;
}

thead th:last-child{
  text-align:right;
}

tbody td{
  padding:34px 0;
  border-bottom:2px solid var(--gray);
  vertical-align:middle;
}

.line{
  color:var(--red);
  font-size:86px;
  font-weight:900;
  width:220px;
}

.dest{
  color:var(--red);
  font-size:72px;
  font-weight:900;
}

.eta{
  color:var(--red);
  font-size:86px;
  font-weight:900;
  text-align:right;
  white-space:nowrap;
  width:260px;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <div class="stop">Stop R • Stratford</div>

    <div class="center">
      <div class="centertext">BUS STOP</div>

      <div class="arrow-wrapper">
        <svg class="arrow-svg" viewBox="0 0 300 100">
          <line x1="10" y1="50" x2="200" y2="50" class="arrow-line"/>
          <polygon points="200,20 290,50 200,80" class="arrow-head"/>
        </svg>
      </div>

    </div>

    <div id="clock" class="clock">--:--</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Line</th>
        <th>Destination</th>
        <th>ETA</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="3">Loading…</td></tr>
    </tbody>
  </table>

</div>

<script>
const STOPPOINT_ID = "490009140S";
const APP_ID = "mmarianholbea";
const APP_KEY = "2ed7f93cc9bf4afeba5a399e39497c78";
const REFRESH_MS = 5000;

function setClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById("clock").textContent = `${hh}:${mm}`;
}

async function loadArrivals(){
  const url =
    `https://api.tfl.gov.uk/StopPoint/${STOPPOINT_ID}/Arrivals` +
    `?app_id=${APP_ID}&app_key=${APP_KEY}`;

  const res = await fetch(url, { cache: "no-store" });
  const data = await res.json();
  data.sort((a,b)=>a.timeToStation-b.timeToStation);

  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  data.slice(0,10).forEach(bus=>{
    const mins = Math.max(0, Math.round(bus.timeToStation/60));
    const etaText = mins===0 ? "Due" : `${mins} min`;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="line">${bus.lineName}</td>
      <td class="dest">${bus.destinationName}</td>
      <td class="eta">${etaText}</td>
    `;
    tbody.appendChild(tr);
  });
}

setClock();
setInterval(setClock,1000);
loadArrivals();
setInterval(loadArrivals,REFRESH_MS);
</script>

</body>
</html>
