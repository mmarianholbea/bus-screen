<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bus Times</title>

<style>
:root{
  --red:#d10000;
  --black:#000;
  --gray:#d9d9d9;
}

body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:#fff;
  color:var(--black);
}

.container{
  padding:55px 90px 55px 70px; /* mai mult spațiu în dreapta pt săgeată */
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:30px;
  margin-bottom:28px;
}

.title{
  font-size:58px;
  font-weight:900;
  white-space:nowrap;
}

.clock{
  font-size:78px;
  font-weight:900;
}

table{
  width:100%;
  border-collapse:collapse;
}

thead th{
  text-align:left;
  font-size:32px;
  font-weight:800;
  padding:0 0 14px 0;
  border-bottom:5px solid var(--black);
}

thead th:last-child{
  text-align:right;
}

tbody td{
  padding:30px 0;
  border-bottom:2px solid var(--gray);
  vertical-align:middle;
  color:var(--red);
}

.line{
  font-size:76px;
  font-weight:900;
  width:200px;
}

.destination{
  font-size:58px;
  font-weight:800;
}

.eta{
  font-size:58px;
  font-weight:900;
  text-align:right;
  white-space:nowrap;
  width:220px;
}

.status{
  font-size:44px;
  font-weight:800;
  color:var(--red);
  padding:30px 0;
}

/* SĂGEATA: fix pe dreapta, pe centru, NU ocupă header */
.arrow-fixed{
  position:fixed;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  font-size:140px;
  font-weight:900;
  color:var(--black);
  line-height:1;
  opacity:0.95;
  pointer-events:none;
}

/* mic “shadow” ca să fie vizibilă pe orice */
.arrow-fixed::after{
  content:"";
}
</style>
</head>

<body>
<div class="arrow-fixed">→</div>

<div class="container">
  <div class="header">
    <div class="title">Stop R • Stratford</div>
    <div id="clock" class="clock">--:--</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Line</th>
        <th>Destination</th>
        <th>ETA</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td class="status" colspan="3">Loading…</td></tr>
    </tbody>
  </table>
</div>

<script>
const STOPPOINT_ID = "490009140S";
const APP_ID = "mmarianholbea";
const APP_KEY = "2ed7f93cc9bf4afeba5a399e39497c78";

const REFRESH_MS = 5000;
const MAX_ROWS = 10;

function updateClock(){
  const d = new Date();
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  document.getElementById("clock").textContent = `${h}:${m}`;
}

function setStatus(text){
  const tbody = document.getElementById("rows");
  tbody.innerHTML = `<tr><td class="status" colspan="3">${text}</td></tr>`;
}

function etaText(seconds){
  const mins = Math.max(0, Math.round(seconds / 60));
  return mins === 0 ? "Due" : `${mins} min`;
}

async function loadBuses(){
  const url = `https://api.tfl.gov.uk/StopPoint/${STOPPOINT_ID}/Arrivals?app_id=${APP_ID}&app_key=${APP_KEY}`;
  const res = await fetch(url, { cache: "no-store" });
  if(!res.ok) throw new Error("TfL " + res.status);

  const data = await res.json();
  data.sort((a,b)=>a.timeToStation-b.timeToStation);

  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  if(!data.length){
    setStatus("No arrivals");
    return;
  }

  data.slice(0, MAX_ROWS).forEach(bus=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="line">${bus.lineName}</td>
      <td class="destination">${bus.destinationName || ""}</td>
      <td class="eta">${etaText(bus.timeToStation)}</td>
    `;
    tbody.appendChild(tr);
  });
}

async function tick(){
  try{
    await loadBuses();
  }catch{
    setStatus("Can’t load bus times");
  }
}

updateClock();
setInterval(updateClock, 1000);
tick();
setInterval(tick, REFRESH_MS);
</script>
</body>
</html>
