<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bus Times</title>

<style>
:root{
  --red:#d40000;
  --black:#000;
  --gray:#e6e6e6;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#fff;
  font-family: Arial, Helvetica, sans-serif;
  color:var(--black);
}

.safe{
  padding:50px 100px 40px;
  box-sizing:border-box;
  height:100%;
}

/* ===== HEADER ===== */

.header-top{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center; /* perfect alignment */
}

.stop{
  font-size:60px;
  font-weight:900;
  white-space:nowrap;
}

.centertext{
  font-size:60px;
  font-weight:900;
  color:var(--red);
  text-align:center;
}

.clock{
  font-size:70px;
  font-weight:900;
  white-space:nowrap;
  text-align:right;
}

/* ARROW ROW */
.header-bottom{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

.arrow{
  animation:nudge 1s ease-in-out infinite;
}

.arrow svg{
  width:240px;
  height:90px;
}

.arrow line{
  stroke:var(--red);
  stroke-width:20;
  stroke-linecap:round;
}

.arrow polygon{
  fill:var(--red);
}

@keyframes nudge{
  0%,100%{ transform: translateX(0); }
  50%{ transform: translateX(30px); }
}

/* ===== TABLE ===== */

table{
  width:100%;
  border-collapse:collapse;
  margin-top:30px;
}

thead th{
  font-size:28px;
  font-weight:900;
  padding:10px 0 12px;
  border-bottom:4px solid #000;
  text-align:left;
}

thead th:last-child{
  text-align:right;
}

tbody td{
  padding:28px 0;
  border-bottom:2px solid var(--gray);
}

.line{
  font-size:80px;
  font-weight:900;
  color:var(--red);
  width:200px;
}

.dest{
  font-size:68px;
  font-weight:900;
  color:var(--red);
}

.eta{
  font-size:80px;
  font-weight:900;
  color:var(--red);
  text-align:right;
  width:240px;
}
</style>
</head>

<body>
<div class="safe">

  <!-- HEADER LINE 1 -->
  <div class="header-top">
    <div class="stop">Stop R • Stratford</div>
    <div class="centertext">BUS STOP</div>
    <div id="clock" class="clock">--:--</div>
  </div>

  <!-- HEADER LINE 2 (arrow only) -->
  <div class="header-bottom">
    <div class="arrow">
      <svg viewBox="0 0 300 100">
        <line x1="10" y1="50" x2="200" y2="50"/>
        <polygon points="200,15 290,50 200,85"/>
      </svg>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Line</th>
        <th>Destination</th>
        <th>ETA</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="3">Loading…</td></tr>
    </tbody>
  </table>

</div>

<script>
const STOPPOINT_ID = "490009140S";
const APP_ID = "mmarianholbea";
const APP_KEY = "2ed7f93cc9bf4afeba5a399e39497c78";

function setClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById("clock").textContent = `${hh}:${mm}`;
}

async function loadArrivals(){
  const url =
    `https://api.tfl.gov.uk/StopPoint/${STOPPOINT_ID}/Arrivals?app_id=${APP_ID}&app_key=${APP_KEY}`;

  const res = await fetch(url);
  const data = await res.json();
  data.sort((a,b)=>a.timeToStation-b.timeToStation);

  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  data.slice(0,8).forEach(bus=>{
    const mins = Math.max(0, Math.round(bus.timeToStation/60));
    const etaText = mins===0 ? "Due" : `${mins} min`;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="line">${bus.lineName}</td>
      <td class="dest">${bus.destinationName}</td>
      <td class="eta">${etaText}</td>
    `;
    tbody.appendChild(tr);
  });
}

setClock();
setInterval(setClock,1000);
loadArrivals();
setInterval(loadArrivals,5000);
</script>

</body>
</html>
